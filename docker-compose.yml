services:
  frontend:
    image: node:24-bullseye
    working_dir: /app/app
    volumes:
      - ./:/app
      - frontend-node-modules:/app/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    env_file:
      - ./app/.env
    volumes:
      - ./:/app
    environment:
      - OUTTAKE_CWD=/app/workspace
      - AGENT_BACKEND=langgraph
      - ENGINE_PROXY_URL=http://engine-proxy:8200
    depends_on:
      engine-proxy:
        condition: service_started
      ffmpeg-mcp:
        condition: service_started

  engine-proxy:
    build:
      context: ./services/engine-proxy
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/workspace
      - ./services/engine-proxy:/app
      - ./services/core-runtime:/app/core-runtime
    environment:
      - WORKSPACE_ROOT=/workspace
      - FFMPEG_MCP_URL=http://ffmpeg-mcp:8100
      - PYTHONPATH=/app:/app/core-runtime
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn http_server:app --host 0.0.0.0 --port 8200"

  ffmpeg-mcp:
    build:
      context: ./services/ffmpeg_mcp
      dockerfile: Dockerfile
    working_dir: /app/services/ffmpeg_mcp
    environment:
      # Must cover session workspaces at /app/sessions/<id>/workspace (not only /app/workspace)
      - WORKSPACE_ROOT=/app
    volumes:
      - ./:/app
    command: python server.py
    ports:
      - "8100:8100"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "3000:80"

volumes:
  frontend-node-modules:
